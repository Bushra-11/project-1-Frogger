<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frogger game</title>
    <script defer src="./app.js"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<div id="win-screen">
    <h1>You Won! Congratulations</h1>
</div>

<body>
    <div id="board">
        <div class="river"></div>
        <div class="road"></div>
        <div class="lilypads">
            <div class="lilypad"></div>
            <div class="lilypad"></div>
            <div class="lilypad"></div>
            <div class="lilypad"></div>
        </div>
        <br>
        <br>
        <div class="logs-firstRow">
            <div class="log-1"></div>
        </div>

        <br>
        <br>
        <br>
        <br>
        <div class="log-2"></div>


        <div id="frog">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="cheeks">
                <div class="cheek"></div>
                <div class="cheek"></div>
            </div>
            <div class="mouth">3</div>
            <div class="belly"></div>
            <div class="legs">
                <div class="left-leg">2</div>
                <div class="right-leg">2</div>
            </div>
        </div>
        <br>
        <br>
        <br>
        <br>
        <br>
        <div class="car">
            <div class="roof"></div>
            <div class="wheels">
                <div class="wheel"></div>
                <div class="wheel"></div>
            </div>
        </div>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <div class="car-2">
            <div class="roof-2"></div>
            <div class="wheels-2">
                <div class="wheel-2"></div>
                <div class="wheel-2"></div>
            </div>
        </div>
        <br>
        <br>
        <br>
        <br>
        <br>
        <div class="car-3">
            <div class="roof-3"></div>
            <div class="wheels-3">
                <div class="wheel-3"></div>
                <div class="wheel-3"></div>
            </div>
        </div>
        <br>
        <br>
        <br>
        <br>
    </div>

</body>

</html>
